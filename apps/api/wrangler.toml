name = "kvalt-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ZITADEL_DOMAIN = "kvalt.zitadel.cloud"
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID"

[[r2_buckets]]
binding = "R2"
bucket_name = "kvalt-files"
preview_bucket_name = "kvalt-files-dev"

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "kvalt-notifications"

[[queues.consumers]]
queue = "kvalt-notifications"
max_batch_size = 100
max_batch_timeout = 30

[triggers]
crons = ["0 17 * * *"]

[observability]
enabled = true
